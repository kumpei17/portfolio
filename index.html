<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Kumpei</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================
   RESET
   ============================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: auto; }
body {
  font-family: 'EB Garamond', Georgia, serif;
  background: #fff;
  color: #000;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; cursor: pointer; }

/* ============================================
   NAV
   ============================================ */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  z-index: 200;
}
.site-name {
  font-size: 14px;
  font-style: normal;
  letter-spacing: 0.01em;
}
.site-name a:hover { opacity: 0.5; }

nav ul {
  display: flex;
  list-style: none;
  gap: 28px;
}
nav ul li a {
  font-size: 14px;
  color: #000;
}
nav ul li a:hover { opacity: 0.5; }

/* ============================================
   VIEWS
   ============================================ */
.view { display: none; }
.view.active { display: block; }

/* ============================================
   WORK LIST
   ============================================ */
#view-list {
  padding-top: 52px;
}

.work-list-inner {
  padding: 48px 28px 80px;
}

.work-list-title {
  font-size: 14px;
  font-weight: 400;
  margin-bottom: 40px;
}

.work-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px 32px;
}

.work-item {
  cursor: pointer;
}

.work-thumb {
  width: 100%;
  aspect-ratio: 4 / 3;
  overflow: hidden;
  background: #f0f0f0;
  margin-bottom: 12px;
}
.work-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.3s;
}
.work-item:hover .work-thumb img { opacity: 0.75; }

.thumb-placeholder {
  width: 100%;
  height: 100%;
  background: #ebebeb;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #bbb;
  letter-spacing: 0.06em;
}

.work-label {
  font-size: 12px;
  color: #888;
  line-height: 1.4;
  margin-bottom: 2px;
}
.work-title {
  font-size: 14px;
  line-height: 1.5;
}

/* ============================================
   WORK DETAIL
   ============================================ */
#view-detail {
  padding-top: 52px;
}

.detail-inner {
  padding: 40px 28px 100px;
  max-width: 760px;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: #000;
  margin-bottom: 48px;
  cursor: pointer;
}
.back-btn:hover { opacity: 0.5; }
.back-arrow { font-size: 16px; line-height: 1; }

.detail-label {
  font-size: 13px;
  color: #888;
  margin-bottom: 2px;
}
.detail-title {
  font-size: 18px;
  font-weight: 400;
  line-height: 1.4;
  margin-bottom: 48px;
}

.detail-images {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.detail-img-wrap {
  width: 100%;
  background: #f0f0f0;
}
.detail-img-wrap img {
  width: 100%;
  height: auto;
  display: block;
}
.detail-img-placeholder {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #bbb;
  letter-spacing: 0.06em;
  background: #ebebeb;
}
.detail-img-placeholder.r-4-3  { aspect-ratio: 4/3; }
.detail-img-placeholder.r-3-2  { aspect-ratio: 3/2; }
.detail-img-placeholder.r-1-1  { aspect-ratio: 1/1; }
.detail-img-placeholder.r-2-3  { aspect-ratio: 2/3; }
.detail-img-placeholder.r-3-4  { aspect-ratio: 3/4; }

.detail-caption {
  margin-top: 28px;
  font-size: 13px;
  color: #888;
  line-height: 1.7;
}

.detail-next {
  display: block;
  margin-top: 64px;
  font-size: 13px;
  color: #888;
  cursor: pointer;
}
.detail-next:hover { color: #000; }
.detail-next-label { font-size: 11px; margin-bottom: 2px; }
.detail-next-title { color: #000; font-size: 14px; }

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 640px) {
  header { padding: 0 18px; }
  .work-list-inner { padding: 36px 18px 60px; }
  .work-grid { grid-template-columns: 1fr; gap: 40px; }
  .detail-inner { padding: 32px 18px 80px; }
  nav ul { gap: 18px; }
}
</style>
</head>
<body>

<!-- ============ HEADER ============ -->
<header>
  <div class="site-name"><a onclick="showList()">Kumpei</a></div>
  <nav>
    <ul>
      <li><a onclick="showList()">Journal</a></li>
      <li><a href="https://www.instagram.com/k.umpei/" target="_blank">Instagram</a></li>
    </ul>
  </nav>
</header>

<!-- ============================================================
     VIEW: WORK LIST
     ============================================================ -->
<div class="view active" id="view-list">
  <div class="work-list-inner">
    <h1 class="work-list-title">Journal</h1>
    <div class="work-grid" id="work-grid"></div>
  </div>
</div>

<!-- ============================================================
     VIEW: WORK DETAIL
     ============================================================ -->
<div class="view" id="view-detail">
  <div class="detail-inner">

    <div class="back-btn" onclick="showList()">
      <span class="back-arrow">←</span>
      <span>Index</span>
    </div>

    <div class="detail-label" id="detail-label"></div>
    <h2 class="detail-title" id="detail-title"></h2>

    <div class="detail-images" id="detail-images"></div>

    <div class="detail-caption" id="detail-caption"></div>

    <div class="detail-next" id="detail-next" onclick="goNext()">
      <div class="detail-next-label">Next</div>
      <div class="detail-next-title" id="next-title"></div>
      <div style="margin-top:4px; font-size:16px;">→</div>
    </div>

  </div>
</div>

<!-- ============================================================
     DATA & LOGIC
     ============================================================ -->
<script>
const works = [
  {
    id: 0,
    label: "Landscape",
    title: "Mountain",
    caption: "",
    thumb: "images/mountain/DSC_0460.jpg",
    images: [
      "images/mountain/DSC_0460.jpg",
      "images/mountain/DSC_0507.jpg",
      "images/mountain/DSC_0510.jpg",
      "images/mountain/DSC_0525.jpg",
      "images/mountain/DSC_0536.jpg",
      "images/mountain/DSC_0564.jpg",
      "images/mountain/DSC_0582.jpg",
      "images/mountain/DSC_0716.jpg",
      "images/mountain/DSC_0800.jpg",
      "images/mountain/DSC_0831.jpg",
    ],
    ratios: [],
  },
];

let currentId = 0;

/* ---- グリッド構築 ---- */
function buildGrid() {
  const grid = document.getElementById('work-grid');
  grid.innerHTML = '';
  works.forEach(w => {
    const item = document.createElement('div');
    item.className = 'work-item';
    item.onclick = () => showDetail(w.id);

    const thumbHtml = w.thumb
      ? `<img src="${w.thumb}" alt="${w.title}" loading="lazy">`
      : `<div class="thumb-placeholder">${w.label}</div>`;

    item.innerHTML = `
      <div class="work-thumb">${thumbHtml}</div>
      <div class="work-label">${w.label}</div>
      <div class="work-title">${w.title}</div>
    `;
    grid.appendChild(item);
  });
}

/* ---- 詳細ページ表示 ---- */
function showDetail(id) {
  currentId = id;
  const w = works[id];

  document.getElementById('detail-label').textContent = w.label;
  document.getElementById('detail-title').textContent = w.title;
  document.getElementById('detail-caption').innerHTML = w.caption.replace(/\n/g,'<br>');

  const container = document.getElementById('detail-images');
  container.innerHTML = '';
  w.images.forEach((src, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'detail-img-wrap';
    if (src) {
      wrap.innerHTML = `<img src="${src}" alt="" loading="lazy">`;
    } else {
      const ratio = w.ratios[i] || 'r-4-3';
      wrap.innerHTML = `<div class="detail-img-placeholder ${ratio}">Photo ${i+1}</div>`;
    }
    container.appendChild(wrap);
  });

  const nextWork = works[(id + 1) % works.length];
  document.getElementById('next-title').textContent = nextWork.title;

  document.getElementById('view-list').classList.remove('active');
  document.getElementById('view-detail').classList.add('active');
  window.scrollTo(0, 0);
}

/* ---- 次の作品 ---- */
function goNext() {
  showDetail((currentId + 1) % works.length);
}

/* ---- 一覧に戻る ---- */
function showList() {
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('view-list').classList.add('active');
  window.scrollTo(0, 0);
}

buildGrid();
</script>
</body>
</html>
